syntax = "proto3";

package presto.v2;

option java_multiple_files = true;
option java_package = "com.facebook.presto.protocol.v2";

message StringMap {
  map<string, string> entries = 1;
}

message Lifespan {
  bool grouped = 1;
  int32 group_id = 2;
}

message ConnectorPayload {
  string encoding = 1;
  bytes data = 2;
}
