syntax = "proto3";

package presto.v2;

option java_multiple_files = true;
option java_package = "com.facebook.presto.protocol.v2";

message BasicQueryInfo {
  string query_id = 1;
  string state = 2;
  string query = 3;
  BasicQueryStats query_stats = 4;
}

message QueryInfo {
  string query_id = 1;
  string state = 2;
  string query = 3;
  QueryStats query_stats = 4;
  optional StageInfo output_stage = 5;
}

message BasicQueryStats {
  int64 create_time_millis = 1;
  int64 end_time_millis = 2;
  int64 elapsed_time_millis = 3;
}

message QueryStats {
  int64 create_time_millis = 1;
  int64 end_time_millis = 2;
  int64 elapsed_time_millis = 3;
  int64 total_cpu_time_millis = 4;
}

message StageInfo {
  string stage_id = 1;
  string state = 2;
  repeated StageInfo sub_stages = 3;
}

message StageExecutionInfo {
  string state = 1;
}

message FailureInfo {
  string type = 1;
  string message = 2;
}

message Warning {
  string code = 1;
  string message = 2;
}
